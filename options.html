<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Net Sniffer 设置</title>
    <style>
      :root {
        /* Light mode defaults */
        --bg-primary: #f9fafb;
        --bg-secondary: #ffffff;
        --text-primary: #111827;
        --text-secondary: #6b7280;
        --border-color: #e5e7eb;
        --border-subtle: #f3f4f6;
        --brand-primary: #4f46e5;
        --brand-hover: #4338ca;
        --btn-text: #ffffff;
        --input-border: #d1d5db;
        --title-color: #111827;
        --switch-off-bg: #e5e7eb;
        --switch-on-bg: #4f46e5;
        --status-success-text: #166534;
        --hover-bg: #f3f4f6;
        --status-default-bg: #f3f4f6;
        --status-default-text: #374151;
        --history-tag-hover-bg: #e5e7eb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-primary: #111827;
          --bg-secondary: #1f2937;
          --text-primary: #f9fafb;
          --text-secondary: #9ca3af;
          --border-color: #374151;
          --border-subtle: #1f2937;
          --brand-primary: #6366f1;
          --brand-hover: #4f46e5;
          --btn-text: #ffffff;
          --input-border: #4b5563;
          --title-color: #f9fafb;
          --switch-off-bg: #4b5563;
          --switch-on-bg: #6366f1;
          --status-success-text: #86efac;
          --hover-bg: #374151;
          --status-default-bg: #374151;
          --status-default-text: #e5e7eb;
          --history-tag-hover-bg: #4b5563;
        }
      }

      body { margin: 0; padding: 20px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg-primary); color: var(--text-primary); }
      .options-app { max-width: 520px; margin: 0 auto; }
      .options-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); padding: 16px 20px; }
      .options-header-title { margin: 0 0 4px; font-size: 20px; font-weight: 700; color: var(--title-color); }
      .options-header-subtitle { margin: 0; font-size: 12px; color: var(--text-secondary); }
      .options-list { margin-top: 16px; display: flex; flex-direction: column; }
      .option-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
      .option-row:last-child { border-bottom: none; }
      .option-text { flex: 1; }
      .option-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
      .option-desc { margin-top: 3px; font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

      .switch { position: relative; display: inline-flex; width: 40px; height: 22px; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--switch-off-bg); transition: 0.2s; border-radius: 999px; box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.6); }
      .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; top: 2px; background-color: #ffffff; border-radius: 999px; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.2); transition: 0.2s; }
      .switch input:checked + .slider { background-color: var(--switch-on-bg); box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.3); }
      .switch input:checked + .slider:before { transform: translateX(18px); }

      .options-footer { margin-top: 18px; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
      .save-status { font-size: 12px; color: var(--status-success-text); opacity: 0; transition: opacity 0.2s; }
      .save-status.visible { opacity: 1; }
      .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; background: var(--brand-primary); color: var(--btn-text); transition: all 0.2s; }
      .btn:hover { background: var(--brand-hover); transform: translateY(-1px); }
      .options-section { margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border-subtle); }
      .options-section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
      .history-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
      .history-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 999px; background-color: var(--status-default-bg); color: var(--status-default-text); font-size: 12px; cursor: default; transition: background-color 0.2s ease, color 0.2s ease; }
      .history-tag:hover { background-color: var(--history-tag-hover-bg); color: var(--text-primary); }
      .history-empty { font-size: 12px; color: var(--text-secondary); }
      .common-keywords-control { margin-top: 4px; display: flex; gap: 8px; }
      .common-keywords-input { flex: 1; padding: 6px 10px; border-radius: 4px; border: 1px solid var(--input-border); font-size: 12px; background: var(--bg-secondary); color: var(--text-primary); }
      .history-tag-delete { border: none; background: transparent; cursor: pointer; font-size: 12px; color: var(--text-secondary); padding: 0 2px; }
      .history-tag-delete:hover { color: var(--status-error-text); }

      /* Theme select specific styles */
      .theme-select {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        font-size: 13px;
        background: var(--bg-secondary);
        color: var(--text-primary);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="options-app">
      <div class="options-card">
        <header>
          <h1 class="options-header-title">Net Sniffer 设置</h1>
          <p class="options-header-subtitle">配置记录策略与 JSON 截断行为，所有选项会保存在浏览器本地。</p>
        </header>

        <section class="options-list">
          <div class="option-row">
            <div class="option-text">
              <div class="option-title">🌙 主题模式</div>
              <div class="option-desc">选择页面显示的主题风格，或跟随系统设置。</div>
            </div>
            <select id="themeSelect" class="theme-select">
              <option value="system">跟随系统</option>
              <option value="light">浅色模式</option>
              <option value="dark">深色模式</option>
            </select>
          </div>

          <div class="option-row">
            <div class="option-text">
              <div class="option-title">仅记录第一次请求</div>
              <div class="option-desc">开启时，每个 URL Path 只保留首次命中的请求；关闭时记录所有请求（可能产生更多条目）。</div>
            </div>
            <label class="switch" aria-label="仅记录第一次请求">
              <input type="checkbox" id="recordFirstToggle" />
              <span class="slider"></span>
            </label>
          </div>

          <div class="option-row">
            <div class="option-text">
              <div class="option-title">自动截断 JSON 数组</div>
              <div class="option-desc">开启时，仅保留 Response JSON 数组中结构最丰富的一条，并添加截断说明；关闭时保留完整 JSON 内容。</div>
            </div>
            <label class="switch" aria-label="自动截断 JSON 数组">
              <input type="checkbox" id="truncateJsonToggle" />
              <span class="slider"></span>
            </label>
          </div>
        </section>

        <section class="options-section">
          <div class="options-section-title">🏷️ 常用关键词管理</div>
          <div class="common-keywords-control">
            <input
              id="newCommonKeywordInput"
              class="common-keywords-input"
              type="text"
              placeholder="添加常用关键词，例如 /api/user"
            />
            <button id="addCommonKeywordBtn" class="btn" type="button">添加</button>
          </div>
          <div id="commonKeywordsList" class="history-container">
            <span class="history-empty">暂无常用关键词</span>
          </div>
        </section>

        <footer class="options-footer">
          <span id="saveStatus" class="save-status">✅ 已保存</span>
          <button id="saveBtn" class="btn">💾 保存配置</button>
        </footer>
      </div>
    </div>

    <script src="theme-utils.js"></script>
    <script src="options.js"></script>
  </body>
  </html>
